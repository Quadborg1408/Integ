<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical and Theatres</title>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #F4D700;
            --silver: #C0C0C0;
            --darker-red: #4a0000;
        }
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'Amarante', serif;
            overflow: hidden;
        }

        .homepage {
            height: 100vh;
            width: 100%;
            background-image: url("bg.png"); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(transparent, rgba(0,0,0,0.6));
            pointer-events: none;
        }

        .content {
            text-align: center;
            z-index: 5;
            transition: opacity 0.5s ease;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 5rem);
            color: var(--gold);
            font-style: italic;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.9);
            margin-bottom: 2rem;
            line-height: 1.1;
        }

        .enter-btn {
            font-family: 'Amarante', serif; 
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid var(--silver);
            padding: 15px 60px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .enter-btn:hover {
            background: var(--gold);
            color: #2b0202;
            border-color: var(--gold);
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--gold);
        }

        .curtain-layer {
            position: fixed;
            top: 0;
            width: 51%;
            height: 100%;
            background-color: #4a0000;
            background-image: repeating-linear-gradient(90deg, #3d0505 0px, #720e0e 50px, #3d0505 100px);
            z-index: 999;
            transition: transform 1.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .curtain-left { left: 0; transform: translateX(-100%); }
        .curtain-right { right: 0; transform: translateX(100%); }

        .curtain-active .curtain-left,
        .curtain-active .curtain-right { transform: translateX(0); }

        .loading-text {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            z-index: 1000;
            font-size: 2rem;
            display: none;
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div id="curtainWrapper">
        <div class="curtain-layer curtain-left"></div>
        <div class="curtain-layer curtain-right"></div>
        <div class="loading-text" id="loader"></div>
    </div>

    <div class="homepage">
        <div class="vignette"></div>
        <div class="content" id="mainContent">
            <h1 class="title">Entertainment:<br>Musical and Theatres</h1>
            <button class="enter-btn" onclick="closeCurtain()">ENTER</button>
        </div>
    </div>

    <script>
        function closeCurtain() {
            document.body.classList.add('curtain-active');
            document.getElementById('mainContent').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('loader').style.display = 'block';
                window.location.href = "mainmenu.html"; 
            }, 1500);
        }
    </script>
</body>
</html>
