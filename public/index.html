<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicals & Theater Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #F4D700; 
            --silver: #E0E0E0;
            --container-bg: rgba(43, 2, 2, 0.92); 
            --overlay: rgba(0, 0, 0, 0.75);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .homepage {
            position: fixed;
            top: 0; left: 0;
            height: 100vh; width: 100vw;
            background: linear-gradient(var(--overlay), var(--overlay)), url("bg.png");
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }
        .container {
            background: var(--container-bg); 
            padding: 3.5rem 2.5rem;
            border-radius: 24px;
            border: 2px solid rgba(244, 215, 0, 0.5); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            text-align: center;
            max-width: 580px; width: 90%;
            backdrop-filter: blur(15px);
            position: relative;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .container.visible { opacity: 1; transform: translateY(0); }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin-bottom: 8px; }
        .subtitle { font-family: 'Playfair Display', serif; font-style: italic; color: var(--silver); margin-bottom: 35px; letter-spacing: 2px; }
        .button-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        
        .diff-btn {
            padding: 12px 24px; border-radius: 50px;
            border: 1px solid rgba(224, 224, 224, 0.3);
            background: rgba(255, 255, 255, 0.05); color: var(--silver);
            cursor: pointer; font-family: 'Amarante', serif; transition: 0.3s;
        }
        .diff-btn.active { background: var(--gold); color: #2b0202; border-color: var(--gold); box-shadow: 0 0 15px rgba(244, 215, 0, 0.4); }
        
        .primary-btn {
            width: 100%; padding: 16px;
            background: var(--gold); color: #2b0202;
            border: none; border-radius: 50px;
            font-family: 'Amarante', serif; font-weight: 600;
            text-transform: uppercase; letter-spacing: 4px;
            cursor: pointer; transition: 0.4s;
        }
        .primary-btn:hover:not(:disabled) { background: #fff; transform: scale(1.02); box-shadow: 0 0 20px var(--gold); }
        .primary-btn:disabled { opacity: 0.6; cursor: wait; }

        .back-btn { background: none; border: none; color: var(--silver); margin-top: 25px; cursor: pointer; font-size: 0.9rem; opacity: 0.7; transition: 0.3s; }
        .back-btn:hover { opacity: 1; color: white; }

        .answer-btn {
            width: 100%; padding: 14px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(244, 215, 0, 0.2); color: var(--silver);
            border-radius: 50px; cursor: pointer; font-family: 'Amarante', serif; transition: 0.3s;
        }
        .answer-btn:hover { background: var(--gold); color: #2b0202; }
        
        #curtainWrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        .curtain-layer {
            position: absolute; top: 0; width: 51%; height: 100%;
            background-color: #4a0000;
            background-image: repeating-linear-gradient(90deg, #3d0505 0px, #720e0e 50px, #3d0505 100px);
            transition: transform 1.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .curtain-left { left: 0; border-right: 2px solid rgba(0,0,0,0.3); }
        .curtain-right { right: 0; border-left: 2px solid rgba(0,0,0,0.3); }
        .curtain-open .curtain-left { transform: translateX(-100%); }
        .curtain-open .curtain-right { transform: translateX(100%); }

        .result {
            width: 100%; padding: 16px;
            background: var(--gold); color: #2b0202;
            border: none; border-radius: 50px;
            font-family: 'Amarante', serif; font-weight: 600;
            text-transform: uppercase; letter-spacing: 4px;
            cursor: pointer; transition: 0.4s;
        }
    </style>
</head>
<body>

    <audio id="theatreSfx" loop>
        <source src="All I ask of you lyrics - Phantom of the Opera.mp3" type="audio/mpeg">
    </audio>

    <div id="curtainWrapper">
        <div id="leftC" class="curtain-layer curtain-left"></div>
        <div id="rightC" class="curtain-layer curtain-right"></div>
    </div>

    <div class="homepage">
        <div class="container" id="mainContainer">
            <div id="settings">
                <h1>Showtime</h1>
                <p class="subtitle">Prepare for your opening night</p>
                <div class="button-group">
                    <button class="diff-btn" onclick="setDiff(this)" data-value="easy">Easy</button>
                    <button class="diff-btn active" onclick="setDiff(this)" data-value="medium">Medium</button>
                    <button class="diff-btn" onclick="setDiff(this)" data-value="hard">Hard</button>
                </div>
                <button class="primary-btn" id="startBtn" onclick="fetchAndStart()">Start Quiz 🎬</button>
                <button class="back-btn" onclick="triggerExit('mainmenu.html')">← Back to Main Menu</button>
            </div>

            <div id="quiz" style="display:none;">
                <div id="question" style="font-family: 'Playfair Display'; color: white; margin: 20px 0; font-size: 1.3rem;"></div>
                <div id="answers"></div>
            </div>

            <div id="result" style="display:none; text-align: center;">
                 <h2 style="font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3rem; font-style: italic; margin-bottom: 10px;">
                    Results
                </h2>

                <p id="final-score" style="color: var(--gold); font-size: 2.2rem; margin: 15px 0; font-family: 'Amarante', serif;"></p>
    
                <button class="primary-btn" onclick="playAgain()" style="font-family: 'Amarante', serif; margin-bottom: 10px;">
                    Play Again 🎭
                </button>
                <br>
                <button class="back-btn" onclick="triggerExit('mainmenu.html')" style="font-family: 'Amarante', serif;">
                    ← Back to Main Menu
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentPool = [];
        let currentIndex = 0;
        let score = 0;
        let selectedDifficulty = 'medium';

        const wrapper = document.getElementById('curtainWrapper');
        const container = document.getElementById('mainContainer');
        const theatreSfx = document.getElementById('theatreSfx');

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                wrapper.classList.add('curtain-open');
                container.classList.add('visible');
                theatreSfx.play().catch(() => console.log("Music waiting for interaction."));
            }, 300);
        });


        function triggerExit(url) {
            wrapper.style.pointerEvents = 'auto';
            wrapper.classList.remove('curtain-open');
            container.classList.remove('visible');

            let fadeInterval = setInterval(() => {
                if (theatreSfx.volume > 0.1) {
                    theatreSfx.volume -= 0.1;
                } else {
                    theatreSfx.pause();
                    clearInterval(fadeInterval);
                    window.location.href = url;
                }
            }, 100);
        }

        function setDiff(btn) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedDifficulty = btn.getAttribute('data-value');
        }

        async function fetchAndStart() {
            theatreSfx.play();
            
            const btn = document.getElementById('startBtn');
            btn.innerText = "Loading Stage...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://opentdb.com/api.php?amount=5&category=13&difficulty=${selectedDifficulty}&type=multiple`);
                const data = await response.json();

                if (data.response_code === 0) {
                    currentPool = data.results.map(item => {
                        const answers = [...item.incorrect_answers, item.correct_answer]
                            .map(a => decodeHTML(a))
                            .sort(() => Math.random() - 0.5);
                        return { question: decodeHTML(item.question), answers, correct: decodeHTML(item.correct_answer) };
                    });
                    startQuizTransition();
                }
            } catch (err) {
                alert("Stage hands busy! Try again.");
                btn.innerText = "Start Quiz 🎬";
                btn.disabled = false;
            }
        }

        function startQuizTransition() {
            wrapper.classList.remove('curtain-open');
            container.classList.remove('visible');
            setTimeout(() => {
                currentIndex = 0; score = 0;
                document.getElementById('settings').style.display = 'none';
                document.getElementById('quiz').style.display = 'block';
                loadQuestion();
                setTimeout(() => {
                    wrapper.classList.add('curtain-open');
                    container.classList.add('visible');
                }, 400);
            }, 1500);
        }

        function playAgain() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('settings').style.display = 'block';
            document.getElementById('startBtn').innerText = "Start Quiz 🎬";
            document.getElementById('startBtn').disabled = false;
        }

        function decodeHTML(html) {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        function loadQuestion() {
            const data = currentPool[currentIndex];
            document.getElementById('question').innerText = data.question;
            const ansDiv = document.getElementById('answers');
            ansDiv.innerHTML = '';
            data.answers.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = choice;
                btn.onclick = () => checkAnswer(choice);
                ansDiv.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            if (choice === currentPool[currentIndex].correct) score++;
            currentIndex++;
            if (currentIndex < 5) loadQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / 5`;
        }
    </script>
</body>
</html>
