<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicals & Theater Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Settings Screen -->
        <div id="settings">
            <div class="theater-icon">🎭</div>
            <h1>Musicals & Theater Quiz</h1>
            <p class="subtitle">Test your knowledge of the stage!</p>

            <div class="setting-group">
                <label>Difficulty</label>
                <div id="difficulty-options" class="button-group">
                    <button type="button" class="diff-btn" data-value="easy">Easy</button>
                    <button type="button" class="diff-btn active" data-value="medium">Medium</button>
                    <button type="button" class="diff-btn" data-value="hard">Hard</button>
                </div>
            </div>

            <button id="start-btn" onclick="startQuiz()">Start Quiz 🎬</button>
            <button class="back-btn" onclick="window.location.href='mainmenu.html'">← Back to Main Menu</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" style="display:none;">
            <div class="quiz-header">
                <span id="question-count"></span>
                <span id="score">Score: 0</span>
            </div>
            <div class="progress-bar">
                <div id="progress" style="width: 0%;"></div>
            </div>
            <div id="question"></div>
            <div id="answers"></div>
            <button id="next-btn" style="display:none;" onclick="nextQuestion()">Next Question →</button>
        </div>

        <!-- Result Screen -->
        <div id="result" style="display:none;">
            <div class="theater-icon">🏆</div>
            <h2>Quiz Complete!</h2>
            <p id="final-score"></p>
            <p id="final-message"></p>
            <button onclick="resetQuiz()">Play Again 🎭</button>
            <button class="back-btn" onclick="window.location.href='mainmenu.html'">← Back to Main Menu</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
