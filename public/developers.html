<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Developers – Musicals & Theater</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .contact-item {
            color: #f4c542;
            text-decoration: none;
            font-size: 1.5em;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .contact-item:hover {
            color: #fff;
            transform: scale(1.2);
        }

        .quote-footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(244, 197, 66, 0.2);
            font-style: italic;
            color: #f4c542;
            font-size: 0.85em;
            opacity: 0.9;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .contact-link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s ease;
            width: 100%;
            max-width: 300px;
        }

        .contact-link-item:hover {
            color: #f4c542;
        }

        .contact-icon {
        background: #f4c542;
        color: #1a0533;
        width: 35px; 
        height: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        font-size: 1.2em; 
        }

        .account-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
        }


        /* Spotify-inspired Footer Player */
        .spotify-footer {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(244, 197, 66, 0.2);
            padding: 12px 20px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 10px;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .album-art {
            width: 45px;
            height: 45px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(244, 197, 66, 0.3);
        }

        .track-details {
            text-align: left;
        }

        .track-name {
            color: #fff;
            font-weight: 600;
            font-size: 0.9em;
            margin: 0;
        }

        .track-artist {
            color: #ccc;
            font-size: 0.75em;
            margin: 0;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
        }

        .control-icon {
            cursor: pointer;
            font-size: 1.1em;
            transition: color 0.2s;
        }

        .control-icon:hover {
            color: #f4c542;
        }

        .play-trigger {
            font-size: 1.5em;
        }

        .spotify-brand {
            color: #1DB954; /* Spotify Green */
            font-size: 1.4em;
        }

        /* Other existing styles stay the same... */
        .dev-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .dev-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(244, 197, 66, 0.2); border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.3s ease; }
        .dev-card:hover { background: rgba(244, 197, 66, 0.1); transform: translateY(-3px); border-color: #f4c542; }
        .dev-photo-sm { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #f4c542; object-fit: cover; }
        #detail-view { display: none; text-align: center; animation: fadeIn 0.4s ease; }
        .expanded-photo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #f4c542; margin-bottom: 15px; object-fit: cover; }
        .bio-box { background: rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 12px; margin: 15px 0; color: #fff; font-size: 0.95em; line-height: 1.6; text-align: left; }
        .skill-badge { display: inline-block; background: #f4c542; color: #1a0533; padding: 4px 10px; border-radius: 5px; font-size: 0.75em; font-weight: 600; margin: 3px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER SECTION -->
        <div id="dev-header">
            <div class="theater-icon">👥</div>
            <h1 id="main-title">The Developers</h1>
            <p class="subtitle" id="main-subtitle">The people behind the curtain.</p>
        </div>

        <!-- LIST VIEW -->
        <div id="list-view" class="dev-grid">
            <div class="dev-card" onclick="showDetail(1)">
                <img src="collado.png" class="dev-photo-sm">
                <div style="text-align: left;">
                    <div style="color: #f4c542; font-weight: 600;">Glennmarie Collado</div>
                    <div style="color: #ccc; font-size: 0.8em;">Frontend Developer</div>
                </div>
            </div>
            <div class="dev-card" onclick="showDetail(2)">
                <img src="gonzaga.jpeg" class="dev-photo-sm">
                <div style="text-align: left;">
                    <div style="color: #f4c542; font-weight: 600;">Katriece Gonzaga</div>
                    <div style="color: #ccc; font-size: 0.8em;">UI/UX Designer</div>
                </div>
            </div>
            <div class="dev-card" onclick="showDetail(3)">
                <img src="villanueva.jpeg" class="dev-photo-sm">
                <div style="text-align: left;">
                    <div style="color: #f4c542; font-weight: 600;">Allyssa May Villanueva</div>
                    <div style="color: #ccc; font-size: 0.8em;">Lead Programmer</div>
                </div>
            </div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="detail-view">
            <img id="det-img" src="" class="expanded-photo">
            <h2 id="det-name" style="margin-bottom: 5px;"></h2>
            <p id="det-role" style="color: #f4c542; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px;"></p>

        <div class="contact-list">
            <a id="det-github-link" href="#" target="_blank" class="contact-link-item">
                <div class="contact-icon"><i class="fa-brands fa-github"></i></div>
                <span id="det-github-text" class="account-text"></span>
            </a>
        
            <a id="det-email-link" href="#" class="contact-link-item">
                <div class="contact-icon"><i class="fa-solid fa-envelope"></i></div>
                <span id="det-email-text" class="account-text"></span>
            </a>

            <a id="det-phone-link" href="#" class="contact-link-item">
                <div class="contact-icon"><i class="fa-solid fa-phone"></i></div>
                <span id="det-phone-text" class="account-text"></span>
            </a>
        </div>

            <div id="det-skills"></div>
            <div class="bio-box" id="det-bio"></div>
            

            <!-- Footer Music Player -->
            <div class="spotify-footer">
                <div class="song-info">
                    <img src="" id="det-album-art" class="album-art">
                    <div class="track-details">
                        <p class="track-name" id="track-name">Track Title</p>
                        <p class="track-artist" id="track-artist">Artist Name</p>
                    </div>
                </div>

                <div class="player-controls">
                    <i class="fa-solid fa-backward-step control-icon"></i>
                    <i class="fa-solid fa-pause control-icon play-trigger" id="pp-icon" onclick="toggleMusic()"></i>
                    <i class="fa-solid fa-forward-step control-icon"></i>
                </div>

                <div class="spotify-brand">
                    <i class="fa-brands fa-spotify"></i>
                </div>
            </div>


            <div class="quote-footer">
                <span id="det-quote"></span>
            </div>

            <button class="back-btn" onclick="showList()">← Back to Team</button>
        </div>

        <button id="menu-btn" class="back-btn" onclick="window.location.href='mainmenu.html'">← Back to Main Menu</button>
    </div>

    <script>
        const devData = {
    1: {
        name: "Glennmarie Collado",
        role: "Frontend Developer",
        photo: "collado.png",
        github: "https://github.com/Glennm-ariee",
        githubUser: "github.com/Glennm-ariee",
        email: "colladoglennm@gmail.com", 
        emailUser: "colladoglennm@email.com",
        phone: "tel:09457597515", 
        phoneUser: "0945 759 7515",
        skills: ["HTML", "CSS", "Visual Design", "MySQL"],
        bio: "Glennmarie served as the primary architect for 'The Developers' page, meticulously crafting the interactive profile layouts and managing the overall visual flow of the section. Beyond conceptualizing the aesthetic direction, she played a vital role in developing the site's core frontend functions, ensuring that every interactive element remains responsive and lively. Her expertise in visual design was instrumental in maintaining high-quality interface standards, ensuring that the transitions between different profiles felt as seamless as a professional stage production.",
        quote: "“The arts are not a luxury. They are a necessity.” — Leonard Bernstein",
        music: "collado.mp3",
        trackTitle: "Kiss of Life", 
        artistName: "Sade",
        albumArt: "glenn-cover.jpg"
    },
    2: {

        role: "UI/UX Designer",
        photo: "gonzaga.jpeg",
        github: "https://github.com/Ria-rie",
        githubUser: "github.com/Ria-rie",
        email: "mailto:katriecegonzaga543@gmail.com",
        emailUser: "katriecegonzaga543@gmail.com",
        phone: "tel:09663069542",
        phoneUser: "0966 306 9542",
        skills: ["HTML", "CSS", "Visual Design", "MySQL"],
        bio: "Katriece was responsible for the extensive development and design of the Home and About pages, establishing the crucial first impression for the theater-themed project. She focused heavily on polishing the user interface, refining intricate color schemes, and ensuring a professional, stage-inspired aesthetic across multiple sections of the site. Additionally, she implemented the project's various animations, adding a layer of dynamic movement that enhances the overall presentation and ensures a smooth, magical journey for every user.",
        quote: "“Art should give a man the opportunity to see things differently.” — Stephen Sondheim",

    3: {

        emailUser: "allyssamyv@gmail.com",

        bio: "As the Lead Programmer, Allyssa headed the development of the system logic and backend framework, ensuring the project's total stability and technical efficiency. She provided essential oversight for the entire architecture, including the flawless execution of the quiz logic and background data handling. While managing the technical 'gears' behind the curtain, she also contributed significantly to the UI/UX design and complex animations, ensuring that the backend performance and frontend aesthetics were perfectly synchronized to meet the project's goals.",

    function toggleMusic() {
        const audioPlayer = document.getElementById('dev-music');
        const icon = document.getElementById('pp-icon');
        const status = document.getElementById('track-status');
        
        if (!audioPlayer) return; // Failsafe para hindi mag-crash

        if (audioPlayer.paused) {
            audioPlayer.play();
            icon.className = "fa-solid fa-pause control-icon play-trigger";
            if(status) status.innerText = "Now Playing";
        } else {
            audioPlayer.pause();
            icon.className = "fa-solid fa-play control-icon play-trigger";
            if(status) status.innerText = "Paused";
        }
    }

    function showList() {
        const audioPlayer = document.getElementById('dev-music');
        
        if (audioPlayer) {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
        }

        document.getElementById('list-view').style.display = 'flex';
        document.getElementById('detail-view').style.display = 'none';
        
        document.getElementById('menu-btn').style.display = 'block';
        document.getElementById('main-subtitle').style.display = 'block';
        
        document.getElementById('main-title').innerText = "The Developers";
        window.scrollTo(0, 0);
    }

    function showDetail(id) {
        const dev = devData[id];
        const audioPlayer = document.getElementById('dev-music');
        
        // Basic Info
        document.getElementById('det-name').innerText = dev.name;
        document.getElementById('det-role').innerText = dev.role;
        document.getElementById('det-img').src = dev.photo;
        document.getElementById('det-bio').innerText = dev.bio;
        document.getElementById('det-quote').innerText = dev.quote;

        // Accounts
        document.getElementById('det-github-link').href = dev.github;
        document.getElementById('det-github-text').innerText = dev.githubUser;
        document.getElementById('det-email-link').href = dev.email;
        document.getElementById('det-email-text').innerText = dev.emailUser;
        document.getElementById('det-phone-link').href = dev.phone;
        document.getElementById('det-phone-text').innerText = dev.phoneUser;

        let skillsHTML = "";
        dev.skills.forEach(s => skillsHTML += `<span class="skill-badge">${s}</span>`);
        document.getElementById('det-skills').innerHTML = skillsHTML;

        document.getElementById('track-name').innerText = dev.trackTitle || "Musical Score";
        document.getElementById('track-artist').innerText = dev.artistName || "Composer";
        document.getElementById('det-album-art').src = dev.albumArt || "default-art.png";
        
        const icon = document.getElementById('pp-icon');
        const status = document.getElementById('track-status');

        // Audio Logic
        if (dev.music && audioPlayer) {
            audioPlayer.src = dev.music; 
            audioPlayer.volume = 0.5;
            
            audioPlayer.play().then(() => {
                icon.className = "fa-solid fa-pause control-icon play-trigger";
                if(status) status.innerText = "Now Playing";
            }).catch(error => {
                icon.className = "fa-solid fa-play control-icon play-trigger";
                if(status) status.innerText = "Click Play to Listen";
                console.log("Autoplay prevented.");
            });
        }

        // View Switch
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('menu-btn').style.display = 'none';
        document.getElementById('main-subtitle').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('main-title').innerText = "Developer Profile";
    }
</script>

<audio id="dev-music" loop></audio>
</body>
</html>
