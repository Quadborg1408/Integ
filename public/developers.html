<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Developers – Musicals & Theater</title>
    
    <!-- Unified Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #F4D700;
            --silver: #C0C0C0;
            --darker-red: #4a0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'Amarante', serif;
            overflow-x: hidden;
            color: white;
            text-align: center; /* Global center alignment */
        }

        .page-wrapper {
            min-height: 100vh;
            width: 100%;
            background-image: url("bg.png"); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(transparent, rgba(0,0,0,0.7));
            pointer-events: none;
        }

        /* Curtain System */
        .curtain-layer {
            position: fixed;
            top: 0;
            width: 51%;
            height: 100%;
            background-color: #4a0000;
            background-image: repeating-linear-gradient(90deg, #3d0505 0px, #720e0e 50px, #3d0505 100px);
            z-index: 999;
            transition: transform 1.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .curtain-left { left: 0; transform: translateX(0); }
        .curtain-right { right: 0; transform: translateX(0); }

        .loaded .curtain-left { transform: translateX(-100%); }
        .loaded .curtain-right { transform: translateX(100%); }

        .container {
            max-width: 800px;
            width: 100%;
            z-index: 5;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
        }

        .loaded .container { opacity: 1; }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: var(--gold);
            font-style: italic;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.9);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: var(--silver);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Centered Dev Cards */
        .dev-grid { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
        }
        
        .dev-card { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(192, 192, 192, 0.3); 
            border-radius: 20px; 
            padding: 30px; 
            width: 100%;
            max-width: 500px;
            display: flex; 
            flex-direction: column; /* Stacked vertically */
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .dev-card:hover { 
            background: var(--gold); 
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .dev-card:hover div, .dev-card:hover i { color: #2b0202 !important; }

        .dev-photo-sm { 
            width: 90px; height: 90px; 
            border-radius: 50%; 
            border: 3px solid var(--gold); 
            object-fit: cover;
            box-shadow: 0 0 15px rgba(244, 215, 0, 0.2);
        }

        /* Detail View - Centered */
        #detail-view { display: none; animation: fadeIn 0.8s ease; }
        
        .expanded-photo { 
            width: 180px; height: 180px; 
            border-radius: 50%; 
            border: 5px solid var(--gold); 
            margin-bottom: 25px; 
            box-shadow: 0 0 40px rgba(244, 215, 0, 0.4);
            object-fit: cover;
        }

        .bio-box { 
            background: rgba(0, 0, 0, 0.6); 
            padding: 30px; 
            border-radius: 20px; 
            margin: 25px 0; 
            line-height: 1.8; 
            text-align: center; /* Centered bio text */
            border-bottom: 4px solid var(--gold); /* Border moved to bottom */
            color: #eee;
            font-size: 1.1rem;
        }

        .skill-badge { 
            background: var(--gold); 
            color: #000; 
            padding: 6px 15px; 
            border-radius: 50px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            margin: 6px;
            display: inline-block;
            text-transform: uppercase;
        }

        /* Spotify Player - Centered Layout */
        .spotify-footer {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--silver);
            padding: 20px;
            border-radius: 60px;
            display: flex;
            flex-direction: column; /* Centered stack */
            align-items: center;
            gap: 15px;
            margin: 30px auto;
            max-width: 400px;
        }

        .music-info-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            font-family: 'Amarante', serif;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--silver);
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-btn:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            transform: scale(1.05);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Curtain Layers -->
    <div id="curtain-l" class="curtain-layer curtain-left"></div>
    <div id="curtain-r" class="curtain-layer curtain-right"></div>

    <div class="page-wrapper">
        <div class="vignette"></div>

        <div class="container">
            <h1 class="title" id="main-title">The Developers</h1>
            <p class="subtitle" id="main-subtitle">The creative minds behind the curtain</p>

            <!-- LIST VIEW -->
            <div id="list-view" class="dev-grid">
                <div class="dev-card" onclick="showDetail(1)">
                    <img src="collado.png" class="dev-photo-sm">
                    <div>
                        <div style="color: var(--gold); font-size: 1.4rem; font-weight: bold;">Glennmarie Collado</div>
                        <div style="color: var(--silver); letter-spacing: 1px;">Frontend Developer</div>
                    </div>
                </div>

                <div class="dev-card" onclick="showDetail(2)">
                    <img src="gonzaga.jpeg" class="dev-photo-sm">
                    <div>
                        <div style="color: var(--gold); font-size: 1.4rem; font-weight: bold;">Katriece Gonzaga</div>
                        <div style="color: var(--silver); letter-spacing: 1px;">UI/UX Designer</div>
                    </div>
                </div>

                <div class="dev-card" onclick="showDetail(3)">
                    <img src="villanueva.jpeg" class="dev-photo-sm">
                    <div>
                        <div style="color: var(--gold); font-size: 1.4rem; font-weight: bold;">Allyssa May Villanueva</div>
                        <div style="color: var(--silver); letter-spacing: 1px;">Lead Programmer</div>
                    </div>
                </div>
            </div>

            <!-- DETAIL VIEW -->
            <div id="detail-view">
                <img id="det-img" src="" class="expanded-photo">
                <h2 id="det-name" class="title" style="font-size: 3rem; margin: 0;"></h2>
                <p id="det-role" style="color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; font-weight: bold;"></p>

                <div id="det-skills"></div>
                
                <div class="bio-box" id="det-bio"></div>

                <div class="spotify-footer">
                    <div class="music-info-group">
                        <img src="" id="det-album-art" style="width: 60px; height: 60px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
                        <div>
                            <p id="track-name" style="font-weight: bold; margin: 0; font-size: 1.1rem; color: #fff;"></p>
                            <p id="track-artist" style="font-size: 0.9rem; color: var(--gold); margin: 0;"></p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <i class="fa-solid fa-pause" id="pp-icon" onclick="toggleMusic()" style="font-size: 1.8rem; cursor: pointer; color: white;"></i>
                        <i class="fa-brands fa-spotify" style="color: #1DB954; font-size: 1.8rem;"></i>
                    </div>
                </div>

                <button class="back-btn" onclick="showList()">← Back to Team</button>
            </div>

            <button id="menu-btn" class="back-btn" onclick="closeAndNavigate('mainmenu.html')">Back to Main Menu</button>
        </div>
    </div>

    <audio id="dev-music" loop></audio>

    <script>
        // Opening curtains on load
        window.onload = () => {
            document.body.classList.add('loaded');
        };

        // Closing curtains then navigating
        function closeAndNavigate(url) {
            document.body.classList.remove('loaded');
            setTimeout(() => {
                window.location.href = url;
            }, 1500);
        }

        const devData = {
            1: {
                name: "Glennmarie Collado",
                role: "Frontend Developer",
                photo: "collado.png",
                skills: ["HTML", "CSS", "Visual Design", "MySQL"],
                bio: "Glennmarie served as the primary architect for 'The Developers' page, meticulously crafting the interactive profile layouts and managing the overall visual flow of the theater experience.",
                music: "collado.mp3",
                trackTitle: "Kiss of Life", 
                artistName: "Sade",
                albumArt: "glenn-cover.jpg"
            },
            2: {
                name: "Katriece Gonzaga",
                role: "UI/UX Designer",
                photo: "gonzaga.jpeg",
                skills: ["HTML", "CSS", "Visual Design", "MySQL"],
                bio: "Katriece was responsible for the development of the Home and About pages, ensuring a professional, stage-inspired aesthetic and seamless user journey across the site.",
                music: "gonzaga.mp3", 
                trackTitle: "Kiss it better", 
                artistName: "Rihanna", 
                albumArt: "kat-cover.jpeg"
            },
            3: {
                name: "Allyssa May Villanueva",
                role: "Lead Programmer",
                photo: "villanueva.jpeg",
                skills: ["HTML", "CSS", "MySQL", "Backend", "System Logic"],
                bio: "As Lead Programmer, Allyssa headed the development of the system logic and backend framework, ensuring project stability, responsiveness, and technical efficiency.",
                music: "villanueva.mp3", 
                trackTitle: "Tattooed Heart", 
                artistName: "Ariana Grande", 
                albumArt: "vill-cover.jpeg"
            }
        };

        function showDetail(id) {
            const dev = devData[id];
            const audio = document.getElementById('dev-music');
            
            document.getElementById('det-name').innerText = dev.name;
            document.getElementById('det-role').innerText = dev.role;
            document.getElementById('det-img').src = dev.photo;
            document.getElementById('det-bio').innerText = dev.bio;
            
            let skillsHTML = "";
            dev.skills.forEach(s => skillsHTML += `<span class="skill-badge">${s}</span>`);
            document.getElementById('det-skills').innerHTML = skillsHTML;

            document.getElementById('track-name').innerText = dev.trackTitle;
            document.getElementById('track-artist').innerText = dev.artistName;
            document.getElementById('det-album-art').src = dev.albumArt;
            
            audio.src = dev.music;
            audio.play();
            document.getElementById('pp-icon').className = "fa-solid fa-pause";

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('menu-btn').style.display = 'none';
            document.getElementById('main-subtitle').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('main-title').innerText = "Developer Profile";
        }

        function showList() {
            document.getElementById('dev-music').pause();
            document.getElementById('list-view').style.display = 'flex';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('menu-btn').style.display = 'inline-block';
            document.getElementById('main-subtitle').style.display = 'block';
            document.getElementById('main-title').innerText = "The Developers";
        }

        function toggleMusic() {
            const audio = document.getElementById('dev-music');
            const icon = document.getElementById('pp-icon');
            if (audio.paused) {
                audio.play();
                icon.className = "fa-solid fa-pause";
            } else {
                audio.pause();
                icon.className = "fa-solid fa-play";
            }
        }
    </script>
</body>
</html>
