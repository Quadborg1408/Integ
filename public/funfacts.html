<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Facts – Musicals & Theater</title>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #F4D700; 
            --silver: #E0E0E0;
            --container-bg: rgba(43, 2, 2, 0.92); 
            --overlay: rgba(0, 0, 0, 0.75);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            font-family: 'Amarante', serif;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0; left: 0;
            height: 100vh; width: 100vw;
            background: linear-gradient(var(--overlay), var(--overlay)), url("bg.png");
            background-size: cover; background-position: center;
            z-index: -1;
        }

        .container {
            background: var(--container-bg); 
            padding: 3.5rem 2.5rem;
            border-radius: 24px;
            border: 2px solid rgba(244, 215, 0, 0.5); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            text-align: center;
            max-width: 600px; width: 90%;
            backdrop-filter: blur(15px);
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .container.visible { opacity: 1; transform: translateY(0); }

        .theater-icon { font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--gold)); }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3rem; margin-bottom: 10px; }
        .subtitle { font-family: 'Playfair Display', serif; font-style: italic; color: var(--silver); margin-bottom: 25px; opacity: 0.8; }

        #fact-display {
            font-size: 1.35rem;
            color: #fff;
            line-height: 1.6;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-style: italic;
            transition: opacity 0.4s ease;
        }

        .primary-btn {
            width: 100%; padding: 16px;
            background: var(--gold); color: #2b0202;
            border: none; border-radius: 50px;
            font-family: 'Amarante', serif; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.4s;
            margin-bottom: 15px;
        }
        .primary-btn:hover { background: #fff; transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }

        .back-btn { 
            background: none; border: none; color: var(--silver); 
            cursor: pointer; font-size: 1rem; opacity: 0.7; transition: 0.3s;
            font-family: 'Amarante', serif;
        }
        .back-btn:hover { opacity: 1; color: white; }

        #curtainWrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        .curtain-layer {
            position: absolute; top: 0; width: 51%; height: 100%;
            background-color: #4a0000;
            background-image: repeating-linear-gradient(90deg, #3d0505 0px, #720e0e 50px, #3d0505 100px);
            transition: transform 1.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
        }
        .curtain-left { left: 0; border-right: 2px solid rgba(0,0,0,0.3); }
        .curtain-right { right: 0; border-left: 2px solid rgba(0,0,0,0.3); }
        .curtain-open .curtain-left { transform: translateX(-100%); }
        .curtain-open .curtain-right { transform: translateX(100%); }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Queen - Bohemian Rhapsody (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <div id="curtainWrapper">
        <div class="curtain-layer curtain-left"></div>
        <div class="curtain-layer curtain-right"></div>
    </div>

    <div class="background"></div>

    <div class="container" id="mainContainer">
        <div class="theater-icon">💡</div>
        <h1>Fun Facts</h1>
        <p class="subtitle">Did you know...?</p>

        <div id="fact-display">Setting the stage...</div>

        <button class="primary-btn" id="genBtn" onclick="generateFact()">Another One! 🎭</button>
        <br>
        <button class="back-btn" onclick="triggerExit('mainmenu.html')">← Back to Main Menu</button>
    </div>

    <script>
        const theaterFacts = [
            "The tradition of the 'Ghost Light'—leaving a single bulb burning on stage at night—is meant to keep the theater's ghosts happy and safe.",
            "The longest-running Broadway musical is 'The Phantom of the Opera', which opened in 1988 and played over 13,000 performances.",
            "Modern 'stage fright' was once called 'the horrors' by actors in the 18th century.",
            "The Lion King's 'Circle of Life' opening sequence features 31 different species of animals represented by puppets and actors.",
            "In 'Wicked', the green makeup used for Elphaba is actually a MAC landscape green chromacake.",
            "Many theaters don't have a Row I. This is to avoid confusing people who might think it's a Row 1 or an 'L'.",
            "The word 'Thespian' comes from Thespis, who in 534 BC became the first person to step out of a Greek chorus and speak dialogue as a character.",
            "A 'Tony Award' is officially called the 'Antoinette Perry Award for Excellence in Theatre'.",
            "In 'Hamilton', the floor of the stage is a turntable that rotates, allowing the actors to move in circles during the 'Hurricane' and 'Satisfied' numbers.",
            "The 'Mister Cellophane' costume in Chicago was actually inspired by a character from the 1920s comic strip 'Barney Google'.",
            "Broadway is the only street in New York City that runs diagonally across the entire island of Manhattan.",
            "The oldest theater in London still in use is the Theatre Royal, Drury Lane, which opened in 1663.",
            "Audrey Hepburn was originally a ballet dancer and chorus girl in London's West End before becoming a film star.",
            "Disney's 'Beauty and the Beast' was the first Broadway show to feature a character flying across the audience (the Beast's transformation).",
            "Legend says that if you whistle in a theater, you'll be fired. Historically, stagehands used whistles to coordinate scene changes, and an accidental whistle could lead to a heavy piece of scenery falling on someone's head!"
        ];

        const wrapper = document.getElementById('curtainWrapper');
        const container = document.getElementById('mainContainer');
        const bgMusic = document.getElementById('bgMusic');
        const factDisplay = document.getElementById('fact-display');
        let lastIndex = -1;

        window.addEventListener('DOMContentLoaded', () => {
            generateFact(); 
            setTimeout(() => {
                wrapper.classList.add('curtain-open');
                container.classList.add('visible');
                bgMusic.play().catch(() => console.log("Music requires user interaction."));
            }, 300);
        });

        function generateFact() {
            factDisplay.style.opacity = 0;

            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * theaterFacts.length);
                } while (randomIndex === lastIndex);
                
                lastIndex = randomIndex;
                factDisplay.innerText = theaterFacts[randomIndex];
                factDisplay.style.opacity = 1;
            }, 400);
        }

        function triggerExit(url) {
            wrapper.style.pointerEvents = 'auto';
            wrapper.classList.remove('curtain-open');
            container.classList.remove('visible');

            let fadeInterval = setInterval(() => {
                if (bgMusic.volume > 0.1) {
                    bgMusic.volume -= 0.1;
                } else {
                    bgMusic.pause();
                    clearInterval(fadeInterval);
                    window.location.href = url;
                }
            }, 100);
        }
    </script>
</body>
</html>
